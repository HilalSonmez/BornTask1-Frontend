
<mat-card class="records-card">

  <h2>Kayıtlarım</h2>
  

  <div class="records-actions">
    <button mat-raised-button class="custom-button" routerLink="/dashboard">
      Panele Dön
    </button>

    <button mat-raised-button color="warn" (click)="logout()">
      Çıkış Yap
    </button>
  </div>
<table mat-table [dataSource]="records" class="records-table">

  <ng-container matColumnDef="text1">
    <th mat-header-cell *matHeaderCellDef> Metin </th>
    <td mat-cell *matCellDef="let record">
      {{ record.text1 }}
    </td>
  </ng-container>

  <ng-container matColumnDef="num1">
    <th mat-header-cell *matHeaderCellDef> Sayı </th>
    <td mat-cell *matCellDef="let record">
      {{ record.num1  }}
    </td>
  </ng-container>

  <ng-container matColumnDef="date1">
    <th mat-header-cell *matHeaderCellDef> Tarih </th>
    <td mat-cell *matCellDef="let record">
      {{ record.date1 }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
</mat-card>
