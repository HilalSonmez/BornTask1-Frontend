<div class="login-container">
  <mat-card class="login-card">
    <h2>Kayıt Ol</h2>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>E-mail</mat-label>
      <input matInput [(ngModel)]="email" placeholder="E-mail">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Şifre</mat-label>
      <input matInput [(ngModel)]="password" type="password" placeholder="Şifre">
    </mat-form-field>

    <button mat-raised-button class="custom-button" (click)="register()">
      Kayıt Ol
    </button>
    <br>
<button mat-raised-button class="custom-button" routerLink="/">
      Anasayfa
    </button>

  </mat-card>
</div>
