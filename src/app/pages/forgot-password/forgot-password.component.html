<div class="login-container">
  <mat-card class="login-card">
    <h2>Şifremi Unuttum</h2>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>E-mail</mat-label>
      <input matInput [(ngModel)]="email" placeholder="E-mail">
    </mat-form-field>

    <button mat-raised-button class="custom-button" (click)="sendResetCode()">
      Kod Gönder
    </button>
  </mat-card>
</div>
